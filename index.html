<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Login New</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
}

.box{
  max-width:350px;
  margin:100px auto;
  padding:20px;
  background:#111827;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #2b3548;
  background:#0f172a;
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#c9a96e;
  cursor:pointer;
  font-weight:bold;
}

#home{
  display:none;
  text-align:center;
  margin-top:100px;
}
</style>
</head>

<body>

<div id="loginBox" class="box">
  <h3>تسجيل الدخول</h3>

  <input id="email" placeholder="الإيميل">
  <input id="password" type="password" placeholder="كلمة السر">

  <button id="btnLogin">دخول</button>
</div>

<div id="home">
  <h2>تم تسجيل الدخول 🎉</h2>
  <button id="logoutBtn">خروج</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 Firebase بتاعك */
const firebaseConfig = {
  apiKey: "AIzaSyAUkeqz4iGn4LwJf93EJa0JilIUoHHdVOs",
  authDomain: "ssss-27d97.firebaseapp.com",
  projectId: "ssss-27d97",
  storageBucket: "ssss-27d97.firebasestorage.app",
  messagingSenderId: "402050236451",
  appId: "1:402050236451:web:5f8ad5ddcd6a7c63377196",
  measurementId: "G-29ENC4J86D"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ===================== */
/* LOGIN */
/* ===================== */

document.getElementById("btnLogin").addEventListener("click", async () => {
  try {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    if (!email || !pass) {
      alert("اكتب البيانات");
      return;
    }

    await signInWithEmailAndPassword(auth, email, pass);

    alert("تم تسجيل الدخول");

  } catch (e) {
    alert(e.message);
    console.log(e.code);
  }
});

/* ===================== */
/* LOGOUT */
/* ===================== */

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
});

/* ===================== */
/* STATE */
/* ===================== */

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("home").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("home").style.display = "none";
  }
});

</script>

</body>
</html>
